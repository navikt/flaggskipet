[tools]
java = "25"

[env]
FLAGGSKIPET_DB_HOST = "localhost"
FLAGGSKIPET_DB_PORT = "5432"
FLAGGSKIPET_DB_DATABASE = "flaggskipet"
FLAGGSKIPET_DB_USERNAME = "flaggskipet"
FLAGGSKIPET_DB_PASSWORD = "dummy-password"
FLAGGSKIPET_KAFKA_BOOTSTRAP_SERVERS = "localhost:9092"
FLAGGSKIPET_KAFKA_HELLO_WORLD_TOPIC = "flaggskipet.dev.hello-world"
FLAGGSKIPET_KAFKA_SYKMELDING_TOPIC = "teamsykmelding.syfo-sendt-sykmelding"
FLAGGSKIPET_KAFKA_SYKMELDING_GROUP_ID = "flaggskipet-sykmelding-v1"
FLAGGSKIPET_KAFKA_SYKMELDING_AUTO_OFFSET_RESET = "earliest"

# App lifecycle
[tasks.go]
description = "Start local infrastructure and run app"
run = [
    { task = "infra" },
    { task = "dev" },
]

[tasks.dev]
description = "Run app using gradle"
run = './gradlew run'

# Quality checks
[tasks.build]
description = "Run build with gradle"
run = './gradlew build'

[tasks.test]
description = "Run tests with gradle"
run = './gradlew test'

[tasks.lint]
description = "Run check with gradle"
run = './gradlew ktlintCheck'

[tasks.format]
description = "Run ktlintFormat with gradle"
run = './gradlew ktlintFormat'

# Local infrastructure
[tasks.infra]
description = "Start local infrastructure"
run = 'docker-compose -f docker-compose.yaml -f docker-compose.kafka.yaml up -d'

[tasks."infra:down"]
description = "Stop local infrastructure"
run = 'docker-compose -f docker-compose.yaml -f docker-compose.kafka.yaml down'

[tasks."infra:clean"]
description = "Remove local infrastructure including volumes"
run = 'docker-compose -f docker-compose.yaml -f docker-compose.kafka.yaml down --volumes'

# Local devtools
[tasks."dev:kafka:hello-world"]
description = "Send a hello-world message to local Kafka"
run = './gradlew :devtools:runKafkaHelloWorld'

# Database migrations
[tasks."migration:info"]
description = "Database migrations info"
run = [{ task = "migration:_run", args = ["flywayInfo"] }]

[tasks."migration:migrate"]
description = "Run database migrations"
run = [{ task = "migration:_run", args = ["flywayMigrate"] }]

[tasks."migration:validate"]
description = "Validate database migrations"
run = [{ task = "migration:_run", args = ["flywayValidate"] }]

[tasks."migration:repair"]
description = "Repair database migrations"
run = [{ task = "migration:_run", args = ["flywayRepair"] }]

# Hidden task shared by migration:* commands
[tasks."migration:_run"]
hide = true
usage = 'arg "<flyway_task>"'
run = '''
./gradlew --no-configuration-cache \
  -Dflyway.user="${FLAGGSKIPET_DB_USERNAME}" \
  -Dflyway.password="${FLAGGSKIPET_DB_PASSWORD}" \
  -Dflyway.url="jdbc:postgresql://${FLAGGSKIPET_DB_HOST}:${FLAGGSKIPET_DB_PORT}/${FLAGGSKIPET_DB_DATABASE}" \
  "${usage_flyway_task?}"
'''